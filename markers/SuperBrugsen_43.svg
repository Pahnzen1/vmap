<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#7a1525" rx="16"/>
  
  <!-- Super text -->
  <text x="150" y="100" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="42" 
        font-weight="normal"
        fill="white" 
        text-anchor="middle"
        letter-spacing="2">Super</text>
  
  <!-- Brugsen text -->
  <text x="150" y="162" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="72" 
        font-weight="bold"
        fill="white" 
        text-anchor="middle"
        letter-spacing="1">Brugsen</text>
  
  <!-- Divider line -->
  <line x1="50" y1="178" x2="250" y2="178" stroke="white" stroke-width="1.5"/>
  
  <!-- Rudkøbing text -->
  <text x="150" y="225" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="36" 
        font-weight="normal"
        fill="white" 
        text-anchor="middle"
        letter-spacing="1">Rudkøbing</text>
</svg>
