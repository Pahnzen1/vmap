<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 90" width="72" height="90">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="rgba(0,0,0,0.35)"/>
    </filter>

    <!-- Rough granite texture gradients — each pillar lit slightly differently -->
    <linearGradient id="gStone1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7a7870"/>
      <stop offset="30%"  stop-color="#c0bdb2"/>
      <stop offset="70%"  stop-color="#b0ada4"/>
      <stop offset="100%" stop-color="#6a6860"/>
    </linearGradient>
    <linearGradient id="gStone2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6e6c64"/>
      <stop offset="35%"  stop-color="#b8b5aa"/>
      <stop offset="75%"  stop-color="#acacA2"/>
      <stop offset="100%" stop-color="#626058"/>
    </linearGradient>
    <linearGradient id="gStone3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#757370"/>
      <stop offset="40%"  stop-color="#c4c0b5"/>
      <stop offset="80%"  stop-color="#b4b0a8"/>
      <stop offset="100%" stop-color="#686662"/>
    </linearGradient>
    <linearGradient id="gStone4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6c6a62"/>
      <stop offset="30%"  stop-color="#b5b2a8"/>
      <stop offset="68%"  stop-color="#c0bdb3"/>
      <stop offset="100%" stop-color="#5e5c56"/>
    </linearGradient>
    <linearGradient id="gGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#8a8a7a"/>
      <stop offset="100%" stop-color="#6a6a5a"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════
       GROUND PLATFORM (stone paving)
  ══════════════════════════════════════════ -->
  <ellipse cx="36" cy="72" rx="28" ry="6"
           fill="url(#gGround)" stroke="#585850" stroke-width="0.6" opacity="0.85"/>
  <!-- Paving stone lines -->
  <path d="M12 72 Q36 68 60 72" fill="none" stroke="#505048" stroke-width="0.4" opacity="0.5"/>
  <path d="M18 74 Q36 71 54 74" fill="none" stroke="#505048" stroke-width="0.4" opacity="0.4"/>
  <path d="M30 70 L30 74" stroke="#505048" stroke-width="0.3" opacity="0.4"/>
  <path d="M36 69 L36 75" stroke="#505048" stroke-width="0.3" opacity="0.4"/>
  <path d="M42 70 L42 74" stroke="#505048" stroke-width="0.3" opacity="0.4"/>

  <!-- ══════════════════════════════════════
       COMPASS ROSE — subtle on ground
  ══════════════════════════════════════════ -->
  <text x="36" y="67" text-anchor="middle" font-family="serif" font-size="3.5" font-weight="bold" fill="#484840" opacity="0.6">N</text>
  <text x="36" y="78" text-anchor="middle" font-family="serif" font-size="3.5" font-weight="bold" fill="#484840" opacity="0.6">S</text>
  <text x="22" y="73" text-anchor="middle" font-family="serif" font-size="3.5" font-weight="bold" fill="#484840" opacity="0.6">V</text>
  <text x="50" y="73" text-anchor="middle" font-family="serif" font-size="3.5" font-weight="bold" fill="#484840" opacity="0.6">Ø</text>

  <!-- ══════════════════════════════════════
       FOUR MONOLITHS
       Arranged: back-left, back-right (taller),
       front-left, front-right (shorter, in front)
       Each tapers toward the top, rough edges
  ══════════════════════════════════════════ -->
  <g filter="url(#shadow)">

    <!-- ── BACK-LEFT PILLAR (WEST / Vest) — tallest ── -->
    <path d="M10 68
             Q9 60 9.5 50
             Q10 38 11 28
             Q12 18 13.5 12
             Q14.5 8  16 10
             Q17.5 8.5 18 12
             Q19 19 19.5 28
             Q20 38 20 50
             Q20 60 19.5 68 Z"
          fill="url(#gStone1)" stroke="#4a4840" stroke-width="0.7"/>
    <!-- Rough left edge texture -->
    <path d="M10 68 Q9.2 55 9.8 40 Q10.2 25 11.5 12" fill="none" stroke="#5a5850" stroke-width="0.5" opacity="0.6"/>
    <!-- Surface crack lines -->
    <path d="M13 30 Q14.5 35 13.5 40" fill="none" stroke="#4a4840" stroke-width="0.4" opacity="0.5"/>
    <path d="M16 20 Q15 25 16.5 30" fill="none" stroke="#4a4840" stroke-width="0.3" opacity="0.4"/>
    <!-- HOLE (circular, drilled through) -->
    <ellipse cx="14.8" cy="48" rx="2.2" ry="2.5" fill="#2a2820" stroke="#3a3830" stroke-width="0.5"/>
    <!-- Hole inner depth shadow -->
    <ellipse cx="14.8" cy="48" rx="1.4" ry="1.6" fill="#181816"/>
    <!-- Hole edge weathering -->
    <path d="M12.8 46 Q12.2 48 12.8 50" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>
    <path d="M16.8 46 Q17.4 48 16.8 50" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>

    <!-- ── BACK-RIGHT PILLAR (EAST / Øst) — tall, slightly slimmer ── -->
    <path d="M51 68
             Q50.5 60 51 50
             Q51.5 38 52 28
             Q53 18 54 12
             Q55 7.5 56.5 9
             Q58 7.5 59 12
             Q60 19 60.5 28
             Q61 38 61 50
             Q61 60 60.5 68 Z"
          fill="url(#gStone2)" stroke="#4a4840" stroke-width="0.7"/>
    <path d="M51 68 Q50.2 52 51 36 Q51.8 20 53.5 11" fill="none" stroke="#545248" stroke-width="0.5" opacity="0.6"/>
    <path d="M55 25 Q56.5 30 55.5 36" fill="none" stroke="#4a4840" stroke-width="0.4" opacity="0.5"/>
    <path d="M57.5 18 Q57 22 58 28" fill="none" stroke="#4a4840" stroke-width="0.3" opacity="0.4"/>
    <!-- HOLE -->
    <ellipse cx="56" cy="44" rx="2.0" ry="2.3" fill="#2a2820" stroke="#3a3830" stroke-width="0.5"/>
    <ellipse cx="56" cy="44" rx="1.2" ry="1.5" fill="#181816"/>
    <path d="M54.2 42.5 Q53.6 44 54.2 45.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>
    <path d="M57.8 42.5 Q58.4 44 57.8 45.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>

    <!-- ── FRONT-LEFT PILLAR (SOUTH / Syd) — medium height ── -->
    <path d="M20 70
             Q19.5 63 20 55
             Q20.5 44 21.5 35
             Q22.5 26 23.5 20
             Q24.5 15.5 25.5 17
             Q26.5 15 27.5 20
             Q28.5 27 29 35
             Q29.5 44 29.5 55
             Q29.5 63 29 70 Z"
          fill="url(#gStone3)" stroke="#4a4840" stroke-width="0.7"/>
    <path d="M20 70 Q19.2 56 20 40 Q20.8 24 22.5 18" fill="none" stroke="#585650" stroke-width="0.5" opacity="0.6"/>
    <path d="M23 38 Q24.5 43 23.5 49" fill="none" stroke="#4a4840" stroke-width="0.4" opacity="0.5"/>
    <path d="M25 26 Q24 31 26 36" fill="none" stroke="#4a4840" stroke-width="0.3" opacity="0.4"/>
    <!-- HOLE -->
    <ellipse cx="24.8" cy="52" rx="2.0" ry="2.2" fill="#2a2820" stroke="#3a3830" stroke-width="0.5"/>
    <ellipse cx="24.8" cy="52" rx="1.2" ry="1.4" fill="#181816"/>
    <path d="M23 50.5 Q22.5 52 23 53.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>
    <path d="M26.6 50.5 Q27.2 52 26.6 53.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>

    <!-- ── FRONT-RIGHT PILLAR (NORTH / Nord) — medium, closest to viewer ── -->
    <path d="M42 70
             Q41.5 63 42 55
             Q42.5 44 43.5 35
             Q44.5 26 45.5 20
             Q46.5 15.5 47.5 17
             Q48.5 15 49.5 20
             Q50.5 27 51 35
             Q51 44 51 55
             Q51 63 50.5 70 Z"
          fill="url(#gStone4)" stroke="#4a4840" stroke-width="0.7"/>
    <path d="M42 70 Q41.2 55 42 38 Q42.8 23 44.5 18" fill="none" stroke="#545250" stroke-width="0.5" opacity="0.6"/>
    <path d="M45 38 Q46.5 44 45.5 50" fill="none" stroke="#4a4840" stroke-width="0.4" opacity="0.5"/>
    <path d="M47 27 Q46 32 48 37" fill="none" stroke="#4a4840" stroke-width="0.3" opacity="0.4"/>
    <!-- HOLE -->
    <ellipse cx="46.5" cy="50" rx="2.0" ry="2.2" fill="#2a2820" stroke="#3a3830" stroke-width="0.5"/>
    <ellipse cx="46.5" cy="50" rx="1.2" ry="1.4" fill="#181816"/>
    <path d="M44.7 48.5 Q44.2 50 44.7 51.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>
    <path d="M48.3 48.5 Q48.8 50 48.3 51.5" fill="none" stroke="#6a6860" stroke-width="0.5" opacity="0.6"/>

  </g>

  <!-- ══════════════════════════════════════
       LABEL
  ══════════════════════════════════════════ -->
  <rect x="-4" y="1" width="80" height="10" rx="5"
        fill="white" stroke="#cccccc" stroke-width="0.9"/>
  <text x="36" y="8.5" text-anchor="middle"
        font-family="'Nunito','Arial',sans-serif"
        font-size="5" font-weight="800" letter-spacing="0.05"
        fill="#000000">De fire verdenshjørner</text>

</svg>
