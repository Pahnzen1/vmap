<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 148" width="100" height="148">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- PILL LABEL ABOVE MILL -->
  <rect x="4" y="20" width="92" height="15" rx="7.5" fill="white" stroke="#cccccc" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="50" y="30.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#1a1a1a" letter-spacing="0.1">Rudkøbing Bymølle</text>

  <!-- Ground / base mound -->
  <ellipse cx="50" cy="147" rx="28" ry="6" fill="#6b8c42" opacity="0.5"/>

  <!-- White lower base -->
  <rect x="36" y="133" width="28" height="10" rx="2" fill="#f0ede6" stroke="#ccc" stroke-width="0.5"/>

  <!-- Main mill body -->
  <polygon points="30,133 70,133 62,73 38,73" fill="#2a2a2a" filter="url(#shadow)"/>

  <!-- Shingle texture -->
  <g stroke="#1a1a1a" stroke-width="0.4" opacity="0.6">
    <line x1="31" y1="126" x2="69" y2="126"/>
    <line x1="32.5" y1="119" x2="67.5" y2="119"/>
    <line x1="34" y1="112" x2="66" y2="112"/>
    <line x1="35.5" y1="105" x2="64.5" y2="105"/>
    <line x1="37" y1="98" x2="63" y2="98"/>
    <line x1="38.5" y1="91" x2="61.5" y2="91"/>
    <line x1="40" y1="84" x2="60" y2="84"/>
    <line x1="41" y1="78" x2="59" y2="78"/>
  </g>

  <!-- Body highlight -->
  <polygon points="30,133 38,73 38,133" fill="#ffffff" opacity="0.04"/>

  <!-- Balcony platform -->
  <rect x="27" y="126" width="46" height="3" rx="1" fill="#e8e4dc" stroke="#ccc" stroke-width="0.5"/>
  <g stroke="#e8e4dc" stroke-width="0.8">
    <line x1="29" y1="126" x2="29" y2="121"/>
    <line x1="33" y1="126" x2="33" y2="121"/>
    <line x1="37" y1="126" x2="37" y2="121"/>
    <line x1="41" y1="126" x2="41" y2="121"/>
    <line x1="45" y1="126" x2="45" y2="121"/>
    <line x1="50" y1="126" x2="50" y2="121"/>
    <line x1="55" y1="126" x2="55" y2="121"/>
    <line x1="59" y1="126" x2="59" y2="121"/>
    <line x1="63" y1="126" x2="63" y2="121"/>
    <line x1="67" y1="126" x2="67" y2="121"/>
    <line x1="71" y1="126" x2="71" y2="121"/>
    <line x1="28" y1="121" x2="72" y2="121"/>
  </g>

  <!-- Cap -->
  <ellipse cx="50" cy="72" rx="12" ry="5" fill="#1e1e1e"/>
  <path d="M38,72 Q50,60 62,72" fill="#222" stroke="#333" stroke-width="0.5"/>

  <!-- Hub -->
  <circle cx="50" cy="70" r="2.5" fill="#e0d8cc" stroke="#999" stroke-width="0.5"/>
  <circle cx="50" cy="70" r="1.2" fill="#aaa"/>

  <!-- Sails -->
  <g transform="rotate(30, 50, 70)">
    <rect x="51.5" y="43" width="6" height="27" rx="1" fill="#f0ede6" stroke="#bbb" stroke-width="0.4"/>
    <g stroke="#bbb" stroke-width="0.4">
      <line x1="51.5" y1="48" x2="57.5" y2="48"/>
      <line x1="51.5" y1="52" x2="57.5" y2="52"/>
      <line x1="51.5" y1="56" x2="57.5" y2="56"/>
      <line x1="51.5" y1="60" x2="57.5" y2="60"/>
      <line x1="51.5" y1="64" x2="57.5" y2="64"/>
      <line x1="54.5" y1="43" x2="54.5" y2="70"/>
    </g>
  </g>
  <g transform="rotate(210, 50, 70)">
    <rect x="51.5" y="43" width="6" height="27" rx="1" fill="#f0ede6" stroke="#bbb" stroke-width="0.4"/>
    <g stroke="#bbb" stroke-width="0.4">
      <line x1="51.5" y1="48" x2="57.5" y2="48"/>
      <line x1="51.5" y1="52" x2="57.5" y2="52"/>
      <line x1="51.5" y1="56" x2="57.5" y2="56"/>
      <line x1="51.5" y1="60" x2="57.5" y2="60"/>
      <line x1="51.5" y1="64" x2="57.5" y2="64"/>
      <line x1="54.5" y1="43" x2="54.5" y2="70"/>
    </g>
  </g>
  <g transform="rotate(120, 50, 70)">
    <rect x="51.5" y="43" width="6" height="27" rx="1" fill="#f0ede6" stroke="#bbb" stroke-width="0.4"/>
    <g stroke="#bbb" stroke-width="0.4">
      <line x1="51.5" y1="48" x2="57.5" y2="48"/>
      <line x1="51.5" y1="52" x2="57.5" y2="52"/>
      <line x1="51.5" y1="56" x2="57.5" y2="56"/>
      <line x1="51.5" y1="60" x2="57.5" y2="60"/>
      <line x1="51.5" y1="64" x2="57.5" y2="64"/>
      <line x1="54.5" y1="43" x2="54.5" y2="70"/>
    </g>
  </g>
  <g transform="rotate(300, 50, 70)">
    <rect x="51.5" y="43" width="6" height="27" rx="1" fill="#f0ede6" stroke="#bbb" stroke-width="0.4"/>
    <g stroke="#bbb" stroke-width="0.4">
      <line x1="51.5" y1="48" x2="57.5" y2="48"/>
      <line x1="51.5" y1="52" x2="57.5" y2="52"/>
      <line x1="51.5" y1="56" x2="57.5" y2="56"/>
      <line x1="51.5" y1="60" x2="57.5" y2="60"/>
      <line x1="51.5" y1="64" x2="57.5" y2="64"/>
      <line x1="54.5" y1="43" x2="54.5" y2="70"/>
    </g>
  </g>

  <!-- Windows: higher on body, very light blue -->
  <rect x="44" y="88" width="6" height="7" rx="1" fill="#d6eeff" stroke="#aac8e0" stroke-width="0.4"/>
  <rect x="44" y="100" width="6" height="7" rx="1" fill="#d6eeff" stroke="#aac8e0" stroke-width="0.4"/>

  <!-- Door at base -->
  <rect x="45" y="127" width="10" height="6" rx="1" fill="#3a2e1e" stroke="#888" stroke-width="0.4"/>

</svg>
