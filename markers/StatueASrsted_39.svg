<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="100" height="150">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- PILL LABEL -->
  <rect x="4" y="1" width="92" height="15" rx="7.5" fill="white" stroke="#cccccc" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="50" y="11.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#1a1a1a" letter-spacing="0.1">A.S. Ørsted</text>

  <!-- Ground -->
  <ellipse cx="50" cy="147" rx="38" ry="4" fill="#6b8c42" opacity="0.25"/>

  <!-- === STONE PEDESTAL === -->
  <!-- Bottom tier -->
  <rect x="15" y="126" width="70" height="18" rx="1" fill="#908878" filter="url(#shadow)"/>
  <rect x="15" y="126" width="70" height="18" rx="1" fill="none" stroke="#7a7268" stroke-width="0.5"/>
  <line x1="15" y1="135" x2="85" y2="135" stroke="#7a7268" stroke-width="0.5"/>
  <line x1="50" y1="126" x2="50" y2="144" stroke="#7a7268" stroke-width="0.4"/>

  <!-- Top tier -->
  <rect x="20" y="108" width="60" height="18" rx="1" fill="#9a9080"/>
  <rect x="20" y="108" width="60" height="18" rx="1" fill="none" stroke="#7a7268" stroke-width="0.5"/>
  <line x1="20" y1="117" x2="80" y2="117" stroke="#7a7268" stroke-width="0.5"/>
  <line x1="45" y1="108" x2="45" y2="126" stroke="#7a7268" stroke-width="0.4"/>
  <line x1="65" y1="108" x2="65" y2="126" stroke="#7a7268" stroke-width="0.4"/>

  <!-- Bronze plate -->
  <rect x="22" y="105" width="56" height="4" rx="0.5" fill="#2c4a3a"/>

  <!-- === SEATED FIGURE === -->
  <g filter="url(#shadow)">

    <!-- Chair back - angled back for lean -->
    <path d="M62,66 L64,105" stroke="#2a4a3a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Chair front legs -->
    <path d="M40,94 L38,105" stroke="#2a4a3a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Chair seat -->
    <path d="M36,92 L64,88" stroke="#2a4a3a" stroke-width="2.5" stroke-linecap="round"/>

    <!-- LONG COAT - main body shape, leaning well back -->
    <path d="
      M44,56
      Q50,58 56,56
      L60,62
      L62,72
      L63,82
      L63,90
      L38,93
      L36,82
      L38,70
      L40,62
      Z
    " fill="#2a4a3a"/>

    <!-- Coat front opening / lapel line -->
    <path d="M48,58 L46,92" stroke="#223a2e" stroke-width="0.7"/>
    <!-- Lapel folds -->
    <path d="M44,58 L46,62 L48,58" fill="#305545" opacity="0.5"/>
    <path d="M52,57 L50,62 L48,58" fill="#305545" opacity="0.5"/>

    <!-- Buttons -->
    <circle cx="47" cy="66" r="0.8" fill="#3a5a48"/>
    <circle cx="47" cy="71" r="0.8" fill="#3a5a48"/>
    <circle cx="46.5" cy="76" r="0.8" fill="#3a5a48"/>
    <circle cx="46" cy="81" r="0.8" fill="#3a5a48"/>

    <!-- Coat tails draping down past seat -->
    <path d="M42,92 Q40,98 36,105" fill="#2a4a3a" stroke="#223a2e" stroke-width="0.5"/>
    <path d="M48,93 Q46,99 43,105" fill="#2a4a3a" stroke="#223a2e" stroke-width="0.3" opacity="0.7"/>
    <!-- Coat tail fold lines -->
    <path d="M40,95 Q39,99 37,103" stroke="#223a2e" stroke-width="0.4" fill="none"/>

    <!-- TROUSERS / LEGS - extended forward -->
    <path d="M38,90 L30,98 L26,105" stroke="#2a4a3a" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M42,91 L34,99 L30,105" stroke="#305545" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Trouser crease lines -->
    <path d="M36,92 L28,102" stroke="#223a2e" stroke-width="0.4" fill="none"/>
    <path d="M40,93 L32,103" stroke="#223a2e" stroke-width="0.3" fill="none"/>

    <!-- Boots -->
    <path d="M21,104 Q24,108 30,107 L30,104 Z" fill="#223a2e"/>
    <path d="M25,104 Q28,108 34,107 L34,104 Z" fill="#2a4a3a"/>

    <!-- LEFT ARM - resting on lap holding papers -->
    <path d="M40,64 Q36,74 38,84" stroke="#2a4a3a" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Coat sleeve detail -->
    <path d="M38,64 Q35,68 36,72" stroke="#305545" stroke-width="1" fill="none"/>
    <!-- Hand -->
    <ellipse cx="38" cy="85" rx="3" ry="2" fill="#2a4a3a"/>
    <!-- Rolled papers in hand -->
    <rect x="33" y="82" width="12" height="3" rx="1.5" fill="#3a5a48" stroke="#2a4a3a" stroke-width="0.5" transform="rotate(-8,39,83)"/>
    <ellipse cx="33.5" cy="83.5" rx="1" ry="1.5" fill="#4a6a58" transform="rotate(-8,33.5,83.5)"/>

    <!-- RIGHT ARM - resting along chair arm -->
    <path d="M58,63 Q60,72 62,80" stroke="#305545" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Sleeve detail -->
    <path d="M59,64 Q61,68 61,72" stroke="#3a5a48" stroke-width="0.8" fill="none"/>

    <!-- COLLAR - high, formal -->
    <path d="M43,55 L48,52 L53,55" fill="#305545" stroke="#2a4a3a" stroke-width="0.5"/>
    <!-- Cravat -->
    <path d="M46,55 L48,57 L50,55" fill="#3a5a48" stroke="#2a4a3a" stroke-width="0.4"/>

    <!-- NECK -->
    <rect x="45" y="49" width="6" height="6" rx="1" fill="#2a4a3a"/>

    <!-- HEAD - tilted slightly forward/down, looking thoughtful -->
    <ellipse cx="47" cy="41" rx="8.5" ry="10.5" fill="#2a4a3a"/>

    <!-- Hair - wavy, swept back, sitting on top of head -->
    <path d="M38,38 Q38,30 43,27 Q48,25 53,27 Q58,30 57,38" fill="#223a2e"/>
    <!-- Hair wave texture -->
    <path d="M40,34 Q44,28 48,27" stroke="#1e3028" stroke-width="0.5" fill="none"/>
    <path d="M48,27 Q52,28 55,33" stroke="#1e3028" stroke-width="0.5" fill="none"/>
    <!-- Hair volume on sides, tucked behind ears -->
    <path d="M38,38 Q37,40 38,42" stroke="#223a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M57,38 Q58,40 57,42" stroke="#223a2e" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Face -->
    <!-- Brow -->
    <path d="M40,39 L46,38" stroke="#1e3028" stroke-width="0.7" fill="none"/>
    <!-- Nose -->
    <path d="M42,40 L40,45 L42,46" stroke="#223a2e" stroke-width="0.7" fill="none"/>
    <!-- Mouth -->
    <path d="M40,48 Q43,49 45,48" stroke="#223a2e" stroke-width="0.5" fill="none"/>
    <!-- Chin -->
    <path d="M40,50 Q43,52 46,50" stroke="#223a2e" stroke-width="0.4" fill="none"/>

    <!-- Bronze patina highlights -->
    <ellipse cx="52" cy="75" rx="4" ry="6" fill="#4a7060" opacity="0.1"/>
    <ellipse cx="34" cy="97" rx="3" ry="3" fill="#4a7060" opacity="0.08"/>
    <ellipse cx="46" cy="42" rx="2" ry="3" fill="#4a7060" opacity="0.08"/>

  </g>

</svg>
